<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administrace — FK Nový Jičín U8</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">
</head>
<body>

<!-- ─── LOGIN SCREEN ──────────────────────────────────────────────────── -->
<div id="login-screen" class="login-screen" style="display:none">
  <div class="login-box">
    <div class="login-logo">⚽</div>
    <h1 class="login-title">FK Nový Jičín U8</h1>
    <p class="login-subtitle">Administrace</p>
    <form id="login-form" class="login-form" novalidate>
      <div class="login-field">
        <label for="l-username">Uživatelské jméno</label>
        <input type="text" id="l-username" class="input" autocomplete="username" required>
      </div>
      <div class="login-field">
        <label for="l-password">Heslo</label>
        <input type="password" id="l-password" class="input" autocomplete="current-password" required>
      </div>
      <div id="login-error" class="login-error" style="display:none">Nesprávné přihlašovací údaje.</div>
      <button type="submit" class="btn btn--primary btn--block">Přihlásit se</button>
    </form>
  </div>
</div>

<!-- ─── ADMIN APP ─────────────────────────────────────────────────────── -->
<div id="admin-app" class="admin-app" style="display:none">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand">
      <span class="sidebar__logo">⚽</span>
      <div>
        <div class="sidebar__title">FK Nový Jičín</div>
        <div class="sidebar__sub">U8 Admin</div>
      </div>
    </div>
    <nav class="sidebar__nav">
      <a href="#trainings" class="sidebar__link" data-section="trainings">
        <span>📅</span> Tréninky
      </a>
      <a href="#exercises" class="sidebar__link" data-section="exercises">
        <span>🏃</span> Cvičení
      </a>
      <a href="#categories" class="sidebar__link" data-section="categories">
        <span>🏷️</span> Kategorie
      </a>
      <a href="#users" class="sidebar__link" data-section="users">
        <span>👤</span> Uživatelé
      </a>
      <a href="#players-admin" class="sidebar__link" data-section="players-admin">
        <span>👥</span> Soupiska
      </a>
      <a href="#testings-admin" class="sidebar__link" data-section="testings-admin">
        <span>📊</span> Testování
      </a>
      <a href="#concept" class="sidebar__link" data-section="concept">
        <span>📋</span> Koncepce
      </a>
      <a href="#appsettings" class="sidebar__link" data-section="appsettings">
        <span>⚙️</span> Nastavení
      </a>
    </nav>
    <div class="sidebar__footer">
      <a href="index.html" class="sidebar__link sidebar__link--back">← Zpět na web</a>
      <button id="btn-logout" class="sidebar__link sidebar__link--logout">Odhlásit se</button>
    </div>
  </aside>

  <!-- Main area -->
  <div class="admin-main">
    <header class="admin-header">
      <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Menu">☰</button>
      <h1 class="admin-header__title" id="admin-page-title">Cvičení</h1>
      <div id="admin-header-actions"></div>
    </header>

    <div class="admin-content" id="admin-content">
      <!-- rendered by JS -->
    </div>
  </div>
</div>

<!-- ─── MODAL ─────────────────────────────────────────────────────────── -->
<div id="modal-overlay" class="modal-overlay" style="display:none" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal" id="modal">
    <div class="modal__header">
      <h2 class="modal__title" id="modal-title"></h2>
      <button class="modal__close" id="modal-close" aria-label="Zavřít">✕</button>
    </div>
    <div class="modal__body" id="modal-body"></div>
  </div>
</div>

<!-- ─── TOAST ─────────────────────────────────────────────────────────── -->
<div id="toast" role="status" aria-live="polite" class="toast"></div>

<script src="js/data.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
